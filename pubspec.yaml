name: todo_app
description: A modular Todo List App with sqflite database.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations: # <-- baru
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  uuid: ^4.0.0
  fl_chart: ^0.68.0
  pdf: ^3.10.0
  intl: ^0.20.2
  printing: ^5.12.0
  path_provider: ^2.1.0
  table_calendar: ^3.1.2
  flutter_quill: ^11.5.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  shared_preferences: ^2.3.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
